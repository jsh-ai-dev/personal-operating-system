<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('노트 상세')}"></head>
<body>
<div th:replace="~{layout/common :: header}"></div>
<main class="site-shell page-stack">
    <a class="btn btn-ghost" href="/notes">목록으로</a>

    <article class="panel detail-card">
        <h1 th:text="${note.title}">제목</h1>
        <div th:if="${message}" class="message" th:text="${message}"></div>

        <div class="meta">
            <span class="badge" th:text="${note.visibility}">PRIVATE</span>
            <span>태그: <strong th:text="${tagsDisplay}">-</strong></span>
            <span>북마크: <strong th:text="${note.bookmarked} ? 'ON' : 'OFF'">OFF</strong></span>
        </div>

        <pre class="note-pre" th:text="${note.content}">본문</pre>

        <div class="actions">
            <a class="btn" th:href="@{|/notes/${note.id}/edit|}">수정</a>

            <form th:if="${!note.bookmarked}" th:action="@{|/notes/${note.id}/bookmark|}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn" type="submit">북마크</button>
            </form>

            <form th:if="${note.bookmarked}" th:action="@{|/notes/${note.id}/unbookmark|}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-ghost" type="submit">북마크 해제</button>
            </form>

            <form th:action="@{|/notes/${note.id}/delete|}" method="post" onsubmit="return confirm('정말 삭제할까요?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-danger" type="submit">삭제</button>
            </form>
        </div>
    </article>
</main>
</body>
</html>
