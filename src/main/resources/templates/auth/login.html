<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('로그인')}"></head>
<body>
<div th:replace="~{layout/common :: header}"></div>
<main class="site-shell page-stack auth-page">
    <section class="auth-hero panel">
        <div>
            <p class="eyebrow">PROJECT 1 · THYMELEAF</p>
            <h1>로그인</h1>
            <p class="subtle">계정은 mk2 중앙 auth-service 에서 관리합니다. mk2 와 동일한 이메일·비밀번호로 로그인하세요.</p>
        </div>
        <div class="auth-hint">
            <p><strong>로컬 개발</strong></p>
            <p class="subtle">mk2 에서 회원가입한 이메일로 로그인하거나, auth-service DB 에 사용자가 있어야 합니다.</p>
        </div>
    </section>

    <section class="panel auth-card">
        <div th:if="${param.error}" class="error-banner">이메일 또는 비밀번호가 올바르지 않습니다.</div>
        <div th:if="${param.logout}" class="message">로그아웃되었습니다.</div>

        <form class="auth-form" th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="row">
                <label for="email">이메일</label>
                <input class="input" id="email" name="email" type="email" autocomplete="username" placeholder="you@example.com" required>
            </div>

            <div class="row">
                <label for="password">비밀번호</label>
                <input class="input" id="password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호" required>
            </div>

            <div class="actions auth-actions">
                <button class="btn btn-primary" type="submit">로그인</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
