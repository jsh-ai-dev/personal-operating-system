<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">POS Notes</title>
    <link rel="stylesheet" th:href="@{/css/notes.css}">
    <script defer th:src="@{/js/notes-theme.js}"></script>
</head>
<body>
<div th:fragment="header">
    <div class="site-shell">
        <header class="site-header">
            <a class="brand" href="/">Personal OS</a>
            <nav class="top-nav">
                <div class="nav-group" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/notes">노트 목록</a>
                    <a class="nav-link nav-link-primary" href="/notes/new">새 노트</a>
                    <a class="nav-link" href="/summary">AI 요약</a>
                </div>

                <a class="nav-link" href="/login" sec:authorize="isAnonymous()">로그인</a>

                <div class="auth-box" sec:authorize="isAuthenticated()">
                    <span class="auth-user" sec:authentication="name">user</span>
                    <form th:action="@{/logout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-ghost" type="submit">로그아웃</button>
                    </form>
                </div>

                <button id="themeToggle" class="btn btn-ghost" type="button" aria-label="테마 전환">다크모드</button>
            </nav>
        </header>
    </div>
</div>
</body>
</html>
