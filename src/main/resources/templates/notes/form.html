<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head(${mode == 'create'} ? '노트 생성' : '노트 수정')}"></head>
<body>
<div th:replace="~{layout/common :: header}"></div>
<main class="site-shell page-stack">
    <h1 th:text="${mode == 'create'} ? '새 노트 만들기' : '노트 수정'">노트 폼</h1>

    <form th:object="${form}"
          class="panel form-wrap"
          th:action="${mode == 'create'} ? @{/notes} : @{|/notes/${noteId}/edit|}"
          method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="row">
            <label for="title">제목</label>
            <input class="input" id="title" type="text" th:field="*{title}" placeholder="노트 제목을 입력하세요">
            <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>

        <div class="row">
            <label for="content">본문</label>
            <textarea class="input" id="content" rows="12" th:field="*{content}" placeholder="기록하고 싶은 내용을 입력하세요"></textarea>
            <div class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
        </div>

        <div class="row two-cols">
            <div>
                <label for="visibility">공개 범위</label>
                <select class="input" id="visibility" th:field="*{visibility}">
                    <option value="PRIVATE">PRIVATE</option>
                    <option value="PUBLIC">PUBLIC</option>
                </select>
            </div>
            <div>
                <label for="tagsText">태그 (콤마 구분)</label>
                <input class="input" id="tagsText" type="text" th:field="*{tagsText}" placeholder="kotlin, spring">
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" type="submit" th:text="${mode == 'create'} ? '노트 생성' : '수정 저장'">저장</button>
            <a class="btn btn-ghost" href="/notes">목록으로</a>
        </div>
    </form>
</main>
</body>
</html>
