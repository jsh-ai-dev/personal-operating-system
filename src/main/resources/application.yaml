spring:
  application:
    name: personal-operating-system-mk1
  servlet:
    multipart:
      # 파일 업로드 크기 제한 (개발 단계: txt/pdf 최대 10MB)
      max-file-size: 10MB
      max-request-size: 11MB
  datasource:
    # 환경변수가 없으면 로컬 PostgreSQL 기본값을 사용합니다.
    # 사용자 입장에서는 Docker나 로컬 설치 DB를 바로 연결해볼 수 있습니다.
    url: ${POS_DB_URL:jdbc:postgresql://localhost:5432/pos_mk1}
    username: ${POS_DB_USERNAME:pos}
    password: ${POS_DB_PASSWORD:pos}
  data:
    redis:
      # Redis 기본값: 로컬 docker compose 서비스(redis:6379)
      host: ${POS_REDIS_HOST:localhost}
      port: ${POS_REDIS_PORT:6379}
      password: ${POS_REDIS_PASSWORD:}
  elasticsearch:
    uris: ${POS_ELASTICSEARCH_URIS:http://localhost:9200}
  session:
    store-type: redis
    redis:
      namespace: ${POS_REDIS_NAMESPACE:pos:mk1:session}
  jpa:
    hibernate:
      # 개발 초기에는 update가 가장 편합니다.
      # 나중에는 반드시 Flyway/Liquibase 같은 마이그레이션 도구로 전환하는 것을 추천합니다.
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: never
  thymeleaf:
    # devtools와 함께 사용 시 템플릿 캐시를 끄면 재기동 없이 변경 반영됩니다.
    cache: false

server:
  servlet:
    session:
      timeout: 30m

pos:
  search:
    elasticsearch:
      enabled: ${POS_SEARCH_ELASTICSEARCH_ENABLED:false}
      index-name: ${POS_SEARCH_ELASTICSEARCH_INDEX_NAME:notes-mk1}
      reindex-on-startup: ${POS_SEARCH_ELASTICSEARCH_REINDEX_ON_STARTUP:true}
  cache:
    note-list:
      key-prefix: ${POS_NOTE_LIST_CACHE_KEY_PREFIX:pos:mk1:notes:list:v1:}
      ttl: ${POS_NOTE_LIST_CACHE_TTL:PT5M}
  auth:
    jwt:
      # mk2 auth-service JWT_SECRET 과 동일해야 Bearer·쿠키 JWT 검증이 성공합니다.
      secret: ${POS_JWT_SECRET:}
    service:
      base-url: ${POS_AUTH_SERVICE_URL:http://127.0.0.1:3002}
    # 로그인 성공 시 httpOnly JWT 쿠키 이름 (JwtAuthenticationFilter 와 동일해야 함)
    token-cookie-name: ${POS_AUTH_TOKEN_COOKIE:mk1_pos_jwt}
    token-cookie-max-age-sec: ${POS_AUTH_TOKEN_COOKIE_MAX_AGE_SEC:604800}
  ai:
    # gemini | openai
    provider: ${POS_AI_PROVIDER:gemini}
    gemini:
      # Gemini API 키: GEMINI_API_KEY 환경변수로 주입하세요.
      # 예) $env:GEMINI_API_KEY="AIza..." 후 서버 재시작
      api-key: ${GEMINI_API_KEY:}
      # 화면에서 flash/pro 라디오 선택 시 아래 모델로 매핑됩니다.
      # 기본값은 flash 모델을 사용합니다. 필요 시 환경변수로 교체하세요.
      flash-model: ${GEMINI_FLASH_MODEL:gemini-2.5-flash}
      pro-model: ${GEMINI_PRO_MODEL:gemini-2.5-pro}
      # 요약 응답 최대 토큰
      max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:4096}
    openai:
      # 필요 시 provider=openai로 바꾸면 이 설정을 사용합니다.
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      max-tokens: ${OPENAI_MAX_TOKENS:2048}

