spring:
  application:
    name: personal-operating-system
  servlet:
    multipart:
      # 파일 업로드 크기 제한 (MVP: txt 100KB 이하만 허용)
      max-file-size: 100KB
      max-request-size: 110KB
  datasource:
    # 환경변수가 없으면 로컬 PostgreSQL 기본값을 사용합니다.
    # 사용자 입장에서는 Docker나 로컬 설치 DB를 바로 연결해볼 수 있습니다.
    url: ${POS_DB_URL:jdbc:postgresql://localhost:5432/personal_operating_system}
    username: ${POS_DB_USERNAME:pos}
    password: ${POS_DB_PASSWORD:pos}
  jpa:
    hibernate:
      # 개발 초기에는 update가 가장 편합니다.
      # 나중에는 반드시 Flyway/Liquibase 같은 마이그레이션 도구로 전환하는 것을 추천합니다.
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: never

pos:
  auth:
    seed:
      # 서버 시작 시 초기 계정이 없으면 생성되고, 있으면 최소 동기화됩니다.
      username: ${POS_SECURITY_USERNAME:pos-admin}
      password: ${POS_SECURITY_PASSWORD:pos-admin1234}
      role: ${POS_SECURITY_ROLE:ROLE_USER}
  ai:
    openai:
      # OpenAI API 키: OPENAI_API_KEY 환경변수로 주입하세요.
      # 예) $env:OPENAI_API_KEY="sk-..." 후 서버 재시작
      api-key: ${OPENAI_API_KEY:}
      # 사용할 모델 (gpt-4o-mini: 빠르고 저렴, 요약 품질 충분)
      model: ${OPENAI_MODEL:gpt-4o-mini}
      # 응답 최대 토큰 수 (요약이므로 600으로 충분)
      max-tokens: ${OPENAI_MAX_TOKENS:600}

