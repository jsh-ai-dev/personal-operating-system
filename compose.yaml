services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: personal-operating-system-mk1-app:latest
    container_name: personal-operating-system-mk1-app
    env_file:
      - ${POS_ENV_FILE:-.env.docker}
    environment:
      POS_DB_URL: jdbc:postgresql://postgres:5432/${POS_DB_NAME:-pos_mk1}
      POS_REDIS_HOST: redis
      POS_REDIS_PORT: 6379
      POS_ELASTICSEARCH_URIS: http://elasticsearch:9200
      POS_SEARCH_ELASTICSEARCH_ENABLED: ${POS_SEARCH_ELASTICSEARCH_ENABLED:-false}
    ports:
      - "${POS_APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: personal-operating-system-mk1-postgres
    environment:
      POSTGRES_DB: ${POS_DB_NAME:-pos_mk1}
      POSTGRES_USER: ${POS_DB_USERNAME:-pos}
      POSTGRES_PASSWORD: ${POS_DB_PASSWORD:-pos}
      TZ: ${POS_DB_TZ:-Asia/Seoul}
    ports:
      - "${POS_DB_BIND:-127.0.0.1}:${POS_DB_PORT:-5432}:5432"
    volumes:
      - personal-operating-system-mk1-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: personal-operating-system-mk1-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${POS_REDIS_BIND:-127.0.0.1}:${POS_REDIS_PORT:-6379}:6379"
    volumes:
      - personal-operating-system-mk1-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: personal-operating-system-mk1-elasticsearch
    env_file:
      - path: .env.elasticsearch
        required: false
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "${POS_ELASTICSEARCH_BIND:-0.0.0.0}:${POS_ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - personal-operating-system-mk1-elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped

volumes:
  personal-operating-system-mk1-postgres-data:
  personal-operating-system-mk1-redis-data:
  personal-operating-system-mk1-elasticsearch-data:
