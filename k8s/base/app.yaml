apiVersion: v1
kind: Service
metadata:
  name: mk1-app
spec:
  selector:
    app: mk1-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mk1-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mk1-app
  template:
    metadata:
      labels:
        app: mk1-app
    spec:
      containers:
        - name: app
          image: personal-operating-system-mk1-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: mk1-config
            - secretRef:
                name: mk1-secret
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
