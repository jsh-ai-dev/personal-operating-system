<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('노트 상세')}"></head>
<body>
<div th:replace="~{layout/common :: header}"></div>
<main class="site-shell page-stack">
    <a class="btn btn-ghost" href="/notes">목록으로</a>

    <article class="panel detail-card">
        <h1 th:text="${note.title}">제목</h1>
        <div th:if="${message}" class="message" th:text="${message}"></div>

        <div class="meta">
            <span class="badge" th:text="${note.visibility}">PRIVATE</span>
            <span>태그: <strong th:text="${tagsDisplay}">-</strong></span>
            <span>북마크: <strong th:text="${note.bookmarked} ? 'ON' : 'OFF'">OFF</strong></span>
            <span th:if="${note.originalFileName != null}">
                원본 파일: <strong th:text="${note.originalFileName}">-</strong>
            </span>
            <span th:if="${note.hasStoredFile and note.fileContentType != null}">
                형식: <strong th:text="${note.fileContentType}">application/pdf</strong>
            </span>
        </div>

        <pre class="note-pre" th:if="${!note.hasStoredFile}" th:text="${note.content}">본문</pre>
        <div class="panel" th:if="${note.hasStoredFile}">
            이 파일 노트는 브라우저 내 미리보기를 지원하지 않습니다. 아래 다운로드 버튼으로 원본 파일을 내려받아 확인해주세요.
        </div>

        <div class="actions">
            <a class="btn" th:if="${!note.hasStoredFile}" th:href="@{|/notes/${note.id}/edit|}">수정</a>

            <!-- 파일 업로드로 생성된 노트인 경우 다운로드 버튼 표시 -->
            <a th:if="${note.originalFileName != null}"
               class="btn btn-ghost"
               th:href="@{|/notes/${note.id}/download|}">
                ⬇ 다운로드
            </a>

            <form th:if="${!note.bookmarked}" th:action="@{|/notes/${note.id}/bookmark|}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn" type="submit">북마크</button>
            </form>

            <form th:if="${note.bookmarked}" th:action="@{|/notes/${note.id}/unbookmark|}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-ghost" type="submit">북마크 해제</button>
            </form>

            <form th:action="@{|/notes/${note.id}/delete|}" method="post" onsubmit="return confirm('정말 삭제할까요?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-danger" type="submit">삭제</button>
            </form>
        </div>

        <section class="panel detail-card">
            <h2>AI 요약</h2>

            <div th:if="${note.aiSummary != null}" class="summary-box" th:text="${note.aiSummary}">저장된 요약</div>
            <p th:if="${note.aiSummary == null}" class="subtle">아직 저장된 요약이 없습니다.</p>

            <form class="actions" th:action="@{|/notes/${note.id}/summary/generate|}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <select class="input input-inline" name="modelTier">
                    <option value="gpt-5-nano" th:selected="${selectedSummaryModelTier == 'gpt-5-nano'}">gpt-5-nano ($0.05 / $0.4)</option>
                    <option value="gpt-5-mini" th:selected="${selectedSummaryModelTier == 'gpt-5-mini'}">gpt-5-mini ($0.25 / $2)</option>
                    <option value="gpt-5" disabled>gpt-5 ($1.25 / $10)</option>
                </select>
                <button class="btn btn-primary" type="submit">AI 요약 생성</button>
            </form>

            <form th:if="${generatedSummary != null}" th:action="@{|/notes/${note.id}/summary/save|}" method="post" class="page-stack">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label for="summary">생성된 요약 (저장 전)</label>
                <textarea id="summary" name="summary" class="input" rows="12" th:text="${generatedSummary}">요약</textarea>
                <div class="actions">
                    <button class="btn btn-primary" type="submit">요약 저장</button>
                </div>
            </form>
        </section>
    </article>
</main>
</body>
</html>
