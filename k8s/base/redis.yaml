apiVersion: v1
kind: Service
metadata:
  name: mk1-redis
spec:
  selector:
    app: mk1-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mk1-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mk1-redis
  template:
    metadata:
      labels:
        app: mk1-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mk1-redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mk1-redis-pvc
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
